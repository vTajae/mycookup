<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MyCookup" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    />
    <title>MyCookup</title>

    <!-- OneSignal v16 SDK with enhanced iOS PWA support -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>


  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Enhanced OneSignal initialization for iOS PWA standalone mode
      window.OneSignalDeferred = window.OneSignalDeferred || [];

      // Detect PWA/standalone mode
      const isPWAStandalone = window.navigator.standalone === true;
      const hasDisplayStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isIOSPWA = isIOS && (isPWAStandalone || hasDisplayStandalone);

      console.log('OneSignal v16 initialization context:', {
        isPWAStandalone,
        hasDisplayStandalone,
        isIOSPWA,
        isIOS,
        url: window.location.href,
        userAgent: navigator.userAgent
      });

      // Enhanced script loading detection for iOS PWA
      let scriptLoadTimeout;
      let scriptLoaded = false;

      // Check if script loaded successfully
      const checkScriptLoaded = () => {
        if (window.OneSignalDeferred && !scriptLoaded) {
          console.log('OneSignal script loaded successfully');
          scriptLoaded = true;
          if (scriptLoadTimeout) clearTimeout(scriptLoadTimeout);

          // For iOS PWA, ensure OneSignal is available globally
          if (isIOSPWA && typeof window.OneSignal === 'undefined') {
            console.log('OneSignal: Setting up global OneSignal for iOS PWA');
            // The service will handle initialization
          }
        }
      };

      // Set up script load monitoring with shorter timeout for iOS PWA
      const timeoutDuration = isIOSPWA ? 5000 : 10000;
      scriptLoadTimeout = setTimeout(() => {
        if (!window.OneSignalDeferred) {
          console.error('OneSignal script failed to load within timeout');
          // The service will handle fallback loading
        }
      }, timeoutDuration);

      // Check immediately and periodically
      checkScriptLoaded();
      const checkInterval = setInterval(() => {
        checkScriptLoaded();
        if (scriptLoaded) {
          clearInterval(checkInterval);
        }
      }, 500); // More frequent checks for iOS PWA

      // Clear interval after timeout
      setTimeout(() => {
        clearInterval(checkInterval);
      }, timeoutDuration + 1000);

      // OneSignal v16 will handle service worker registration automatically
      console.log('OneSignal v16 will handle service worker registration');
    </script>
  </body>
</html>
