<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS PWA WebSocket Debug Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d30;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status.connected {
            background: #4caf50;
            color: white;
        }

        .status.disconnected {
            background: #f44336;
            color: white;
        }

        .status.connecting {
            background: #ff9800;
            color: white;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #007acc;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background: #005a9e;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .url-input {
            padding: 6px 10px;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-size: 12px;
            min-width: 300px;
        }

        .console-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .console-header {
            background: #252526;
            padding: 10px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-logs {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #1e1e1e;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 4px solid;
            font-size: 13px;
            line-height: 1.4;
        }

        .log-entry.log {
            border-left-color: #007acc;
            background: rgba(0, 122, 204, 0.1);
        }

        .log-entry.info {
            border-left-color: #0078d4;
            background: rgba(0, 120, 212, 0.1);
        }

        .log-entry.warn {
            border-left-color: #ff8c00;
            background: rgba(255, 140, 0, 0.1);
        }

        .log-entry.error {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .log-entry.debug {
            border-left-color: #9c27b0;
            background: rgba(156, 39, 176, 0.1);
        }

        .log-entry.connection {
            border-left-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }

        .log-timestamp {
            color: #888;
            font-size: 11px;
            margin-right: 10px;
        }

        .log-level {
            font-weight: bold;
            margin-right: 10px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .log-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-metadata {
            margin-top: 5px;
            font-size: 11px;
            color: #888;
            border-top: 1px solid #3e3e42;
            padding-top: 5px;
        }

        .device-info {
            display: inline-block;
            background: #2d2d30;
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 8px;
        }

        .connection-id {
            color: #4caf50;
            font-weight: bold;
        }

        .stats {
            font-size: 12px;
            color: #888;
        }

        .filters {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .filter-checkbox input {
            margin: 0;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: center;
            }

            .url-input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🔍 iOS PWA WebSocket Debug Console</div>
        <div class="controls">
            <input type="text" class="url-input" id="wsUrl" placeholder="WebSocket URL" 
                   value="wss://mycookup-websocket-logger-dev.4ufood4u.workers.dev/ws">
            <div class="status disconnected" id="status">Disconnected</div>
            <button id="connectBtn">Connect</button>
            <button id="clearBtn">Clear</button>
        </div>
    </div>

    <div class="console-container">
        <div class="console-header">
            <div class="stats" id="stats">Logs: 0 | Connections: 0</div>
            <div class="filters">
                <div class="filter-checkbox">
                    <input type="checkbox" id="filterLog" checked>
                    <label for="filterLog">Log</label>
                </div>
                <div class="filter-checkbox">
                    <input type="checkbox" id="filterInfo" checked>
                    <label for="filterInfo">Info</label>
                </div>
                <div class="filter-checkbox">
                    <input type="checkbox" id="filterWarn" checked>
                    <label for="filterWarn">Warn</label>
                </div>
                <div class="filter-checkbox">
                    <input type="checkbox" id="filterError" checked>
                    <label for="filterError">Error</label>
                </div>
                <div class="filter-checkbox">
                    <input type="checkbox" id="filterDebug" checked>
                    <label for="filterDebug">Debug</label>
                </div>
            </div>
        </div>
        <div class="console-logs" id="logs"></div>
    </div>

    <script>
        class WebSocketDebugConsole {
            constructor() {
                this.websocket = null;
                this.logs = [];
                this.connections = new Set();
                this.isConnected = false;
                
                this.initializeElements();
                this.bindEvents();
                this.loadSettings();
            }

            initializeElements() {
                this.wsUrlInput = document.getElementById('wsUrl');
                this.statusElement = document.getElementById('status');
                this.connectBtn = document.getElementById('connectBtn');
                this.clearBtn = document.getElementById('clearBtn');
                this.logsContainer = document.getElementById('logs');
                this.statsElement = document.getElementById('stats');
                
                this.filters = {
                    log: document.getElementById('filterLog'),
                    info: document.getElementById('filterInfo'),
                    warn: document.getElementById('filterWarn'),
                    error: document.getElementById('filterError'),
                    debug: document.getElementById('filterDebug')
                };
            }

            bindEvents() {
                this.connectBtn.addEventListener('click', () => this.toggleConnection());
                this.clearBtn.addEventListener('click', () => this.clearLogs());
                
                Object.values(this.filters).forEach(filter => {
                    filter.addEventListener('change', () => this.applyFilters());
                });

                this.wsUrlInput.addEventListener('change', () => this.saveSettings());
            }

            loadSettings() {
                const savedUrl = localStorage.getItem('wsDebugConsoleUrl');
                if (savedUrl) {
                    this.wsUrlInput.value = savedUrl;
                }
            }

            saveSettings() {
                localStorage.setItem('wsDebugConsoleUrl', this.wsUrlInput.value);
            }

            toggleConnection() {
                if (this.isConnected) {
                    this.disconnect();
                } else {
                    this.connect();
                }
            }

            connect() {
                const url = this.wsUrlInput.value.trim();
                if (!url) {
                    alert('Please enter a WebSocket URL');
                    return;
                }

                this.updateStatus('connecting', 'Connecting...');
                this.connectBtn.disabled = true;

                try {
                    this.websocket = new WebSocket(url);

                    this.websocket.onopen = () => {
                        this.isConnected = true;
                        this.updateStatus('connected', 'Connected');
                        this.connectBtn.textContent = 'Disconnect';
                        this.connectBtn.disabled = false;
                        this.addSystemLog('Connected to WebSocket server', 'connection');
                        this.saveSettings();
                    };

                    this.websocket.onmessage = (event) => {
                        this.handleMessage(event.data);
                    };

                    this.websocket.onclose = (event) => {
                        this.isConnected = false;
                        this.updateStatus('disconnected', 'Disconnected');
                        this.connectBtn.textContent = 'Connect';
                        this.connectBtn.disabled = false;
                        this.addSystemLog(`Connection closed: ${event.code} ${event.reason}`, 'connection');
                    };

                    this.websocket.onerror = (error) => {
                        this.addSystemLog(`WebSocket error: ${error}`, 'error');
                        this.connectBtn.disabled = false;
                    };

                } catch (error) {
                    this.updateStatus('disconnected', 'Connection Failed');
                    this.connectBtn.disabled = false;
                    this.addSystemLog(`Failed to connect: ${error.message}`, 'error');
                }
            }

            disconnect() {
                if (this.websocket) {
                    this.websocket.close();
                    this.websocket = null;
                }
            }

            handleMessage(data) {
                try {
                    const message = JSON.parse(data);
                    
                    if (message.type === 'console') {
                        this.addConsoleLog(message);
                    } else if (message.type === 'connection') {
                        this.connections.add(message.connectionId);
                        this.addSystemLog(`New connection: ${message.connectionId}`, 'connection');
                    } else if (message.type === 'disconnection') {
                        this.connections.delete(message.connectionId);
                        this.addSystemLog(`Connection disconnected: ${message.connectionId}`, 'connection');
                    } else {
                        this.addSystemLog(`Unknown message type: ${message.type}`, 'debug');
                    }
                    
                    this.updateStats();
                } catch (error) {
                    this.addSystemLog(`Failed to parse message: ${error.message}`, 'error');
                }
            }

            addConsoleLog(message) {
                const logEntry = {
                    ...message,
                    id: Date.now() + Math.random(),
                    isSystem: false
                };
                
                this.logs.push(logEntry);
                this.renderLog(logEntry);
                this.scrollToBottom();
            }

            addSystemLog(content, level = 'info') {
                const logEntry = {
                    id: Date.now() + Math.random(),
                    type: 'system',
                    level,
                    content,
                    timestamp: new Date().toISOString(),
                    isSystem: true
                };
                
                this.logs.push(logEntry);
                this.renderLog(logEntry);
                this.scrollToBottom();
            }

            renderLog(logEntry) {
                const logElement = document.createElement('div');
                logElement.className = `log-entry ${logEntry.level}`;
                logElement.dataset.level = logEntry.level;
                logElement.dataset.logId = logEntry.id;

                const timestamp = new Date(logEntry.timestamp).toLocaleTimeString();
                
                if (logEntry.isSystem) {
                    logElement.innerHTML = `
                        <span class="log-timestamp">${timestamp}</span>
                        <span class="log-level">${logEntry.level}</span>
                        <span class="log-content">${logEntry.content}</span>
                    `;
                } else {
                    const args = logEntry.args || [];
                    const content = args.map(arg => 
                        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                    ).join(' ');

                    const deviceInfo = logEntry.deviceInfo || {};
                    const deviceTags = [
                        deviceInfo.isIOS && '📱 iOS',
                        deviceInfo.isPWA && '🔗 PWA',
                        deviceInfo.isStandalone && '📲 Standalone'
                    ].filter(Boolean).join(' ');

                    logElement.innerHTML = `
                        <span class="log-timestamp">${timestamp}</span>
                        <span class="log-level">${logEntry.level}</span>
                        <span class="log-content">${content}</span>
                        ${logEntry.connectionId ? `
                            <div class="log-metadata">
                                <span class="connection-id">${logEntry.connectionId}</span>
                                ${deviceTags ? `<span class="device-info">${deviceTags}</span>` : ''}
                                <span class="device-info">${deviceInfo.viewport || 'Unknown'}</span>
                                <span class="device-info">${logEntry.url || ''}</span>
                            </div>
                        ` : ''}
                    `;
                }

                this.logsContainer.appendChild(logElement);
                this.applyFilters();
            }

            applyFilters() {
                const logElements = this.logsContainer.querySelectorAll('.log-entry');
                logElements.forEach(element => {
                    const level = element.dataset.level;
                    const filter = this.filters[level];
                    element.style.display = filter && filter.checked ? 'block' : 'none';
                });
            }

            clearLogs() {
                this.logs = [];
                this.logsContainer.innerHTML = '';
                this.updateStats();
            }

            updateStatus(status, text) {
                this.statusElement.className = `status ${status}`;
                this.statusElement.textContent = text;
            }

            updateStats() {
                this.statsElement.textContent = `Logs: ${this.logs.length} | Connections: ${this.connections.size}`;
            }

            scrollToBottom() {
                this.logsContainer.scrollTop = this.logsContainer.scrollHeight;
            }
        }

        // Initialize the debug console
        const debugConsole = new WebSocketDebugConsole();
        
        // Auto-connect if URL is provided
        if (debugConsole.wsUrlInput.value) {
            setTimeout(() => debugConsole.connect(), 1000);
        }
    </script>
</body>
</html>
